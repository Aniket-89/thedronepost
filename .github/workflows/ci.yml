name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build_and_lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches the @types/node^20 version in package.json
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Verify Build
        # Expose dummy vars so Next.js doesn't fail if it requires env during build time parsing
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: "dummy_id"
          NEXT_PUBLIC_SANITY_DATASET: "production"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
        run: npm run build
